name: Budgetjar
options:
  bundleIdPrefix: com.shimondeitel.budgetjar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Budgetjar:
    type: application
    platform: iOS
    sources:
      - path: Budgetjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.budgetjar
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Budgetjar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BudgetjarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BudgetjarTests
      - path: Budgetjar.storekit
    dependencies:
      - target: Budgetjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.budgetjar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BudgetjarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BudgetjarUITests
    dependencies:
      - target: Budgetjar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.budgetjar.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Budgetjar:
    build:
      targets:
        Budgetjar: all
        BudgetjarTests: [test]
        BudgetjarUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Budgetjar.storekit
    test:
      config: Debug
      storeKitConfiguration: Budgetjar.storekit
      targets:
        - BudgetjarTests
        - BudgetjarUITests
    archive:
      config: Release
